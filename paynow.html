  <body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <header>
      <a href="index.html">
        <img
          class="logo"
          src="Images/squareeyeslogo-nobackground.png"
          alt="SquareEyes Logo"
        />
      </a>
      <input type="checkbox" name="header" id="menu-checkbox" />
      <label
        for="menu-checkbox"
        class="hamburger-icon"
        aria-label="Open menu"
        title="Open menu"
      >
        <i class="fas fa-bars" aria-hidden="true"></i>
      </label>
      <div class="navigation-wrap">
        <nav class="nav-menu" aria-label="Navigation">
          <a href="explore.html">explore content</a>
          <a href="contact.html">contact us</a>
        </nav>
        <nav class="nav-head" aria-label="Actions">
          <a href="cart.html">
            <img
              src="Images/simple-cart.256x230.png"
              class="cart-icon"
              alt="Shopping cart icon"
            />
            <span class="cart-text">Cart</span></a
          >
          <a href="signin-signup.html" class="sign-up">Sign up</a>
          <a href="signin-signup.html" class="log-in">Sign in</a>
        </nav>
      </div>
    </header>
    <main id="main-content">
      <div>
        <h1 class="title-payment">Payment Details</h1>
      </div>

      <div class="payment-grid">
        <div class="payment-form-col">
          <h2>Enter your details</h2>
          <form class="payment-form">
            <div class="form-group">
              <label for="name">Full Name</label>
              <input
                type="text"
                id="name"
                name="cardname"
                placeholder="Ex. Dale Cooper"
                required
              />
            </div>
            <div class="form-group">
              <label for="ccnum">Card Number</label>
              <input
                type="text"
                id="ccnum"
                name="cardnumber"
                placeholder="1234 5678 9012 3456"
                required
              />
            </div>
            <div class="form-group">
              <label for="expdate">Expiration Date</label>
              <input
                type="text"
                id="expdate"
                name="expdate"
                placeholder="MM/YY"
                required
              />
            </div>
            <div class="form-group">
              <label for="cvc">CVC</label>
              <input
                type="text"
                id="cvc"
                name="cvc"
                placeholder="123"
                required
              />
            </div>
            <button class="paymentbutton" type="submit">Pay Now</button>
          </form>
        </div>

        <div class="payment-summary-col">
          <h2>Order Summary</h2>
          <div id="payment-cart-summary"></div>
        </div>
      </div>
    </main>
    <footer class="footer">
      <div class="footer-container">
        <hr class="footer-divider" />
        <a href="index.html">
          <img
            class="footer-logo"
            src="Images/squareeyeslogo-nobackground.png"
            alt="SquareEyes Logo"
          />
        </a>
        <ul class="footer-links">
          <li><a href="about.html">About Us</a></li>
          <li><a href="contact.html">Contact Us</a></li>
        </ul>
        <p class="copyright-text">
          &copy; 2026 Noroff Interaction Design Course Assignment
        </p>
      </div>
    </footer>
    <script type="module" src="./JS/main.js"></script>
  </body>
</html>
